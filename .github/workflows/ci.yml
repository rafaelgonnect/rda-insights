name: CI
on: [push, pull_request]

env:
  # Stub env values to satisfy lib/env.ts zod schema during CI builds.
  # Real values are injected at runtime by EasyPanel.
  APP_USERNAME: ci
  APP_PASSWORD: ci-stub-password
  ANTHROPIC_API_KEY: sk-ci-stub-key
  ANTHROPIC_MODEL: claude-sonnet-4-6
  MCP_INTERNAL_URL: http://localhost:5008
  MCP_JWT_SECRET: ci-stub-secret-at-least-32-chars-xx
  MCP_JWT_ISSUER: claude-code-user
  MCP_JWT_AUDIENCE: superset-mcp
  SUPERSET_URL: http://localhost:8088
  REDIS_URL: redis://localhost:6379/2
  MAX_USD_MONTH: "20"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
