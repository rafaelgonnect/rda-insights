name: CI
on: [push, pull_request]

env:
  # Stub env values to satisfy lib/env.ts zod schema during CI builds.
  # Real values are injected at runtime by EasyPanel.
  APP_USERNAME: ci
  APP_PASSWORD: ci-stub-password
  OPENROUTER_API_KEY: sk-or-v1-ci-stub-key
  OPENROUTER_MODEL: anthropic/claude-sonnet-4.5
  SUPERSET_URL: http://localhost:8088
  SUPERSET_INTERNAL_URL: http://localhost:8088
  SUPERSET_USERNAME: admin
  SUPERSET_PASSWORD: ci-stub-password
  REDIS_URL: redis://localhost:6379/2
  MAX_USD_MONTH: "20"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

  build:
    needs: lint-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
